version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: simavek_inventory_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:5432" 
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./simavek_inventory_service.sql:/docker-entrypoint-initdb.d/simavek_inventory_service.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - simavek-network

  hasura:
    image: hasura/graphql-engine:v2.36.0
    container_name: simavek_inventory_hasura
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${HASURA_PORT}:8080"
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_ADMIN_SECRET}
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: ${HASURA_UNAUTHORIZED_ROLE}
    networks:
      - simavek-network

volumes:
  pg_data:

networks:
  simavek-network:
    driver: bridge