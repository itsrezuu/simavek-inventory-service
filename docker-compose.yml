version: '3.8'

services:
  inventory-db:
    image: postgres:15-alpine
    container_name: simavek-inventory-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory_db
    ports:
      - "5433:5432"
    volumes:
      - inventory_db_data:/var/lib/postgresql/data
      - ./simavek_inventory_service.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventory_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - simavek-network

  inventory-hasura:
    image: hasura/graphql-engine:v2.36.0
    container_name: simavek-inventory-hasura
    restart: always
    depends_on:
      inventory-db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:postgres@inventory-db:5432/inventory_db
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: myadminsecret
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: public
    networks:
      - simavek-network

volumes:
  inventory_db_data:

networks:
  simavek-network:
    external: true