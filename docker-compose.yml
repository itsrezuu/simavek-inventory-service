version: '3.8'

services:
  inventory-db:
    image: postgres:15-alpine
    container_name: inventory-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory_db
    ports:
      - "5433:5432"
    volumes:
      - inventory_data:/var/lib/postgresql/data
    networks:
      - apotek-network

  inventory-hasura:
    image: hasura/graphql-engine:latest
    container_name: inventory-hasura
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:postgres@inventory-db:5432/inventory_db
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: myadminsecret
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: public
    depends_on:
      - inventory-db
    networks:
      - apotek-network

volumes:
  inventory_data:

networks:
  apotek-network:
    driver: bridge